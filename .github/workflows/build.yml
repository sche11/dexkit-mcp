name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  schedule:
    # 每周一 UTC 00:00 自动构建，跟进上游 DexKit
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'DexKit upstream ref (branch/tag/commit)'
        required: false
        default: ''
        type: string

# 避免并发构建互相覆盖产物
concurrency:
  group: build-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.platform-tag }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform-tag: windows-x86_64
          - os: ubuntu-latest
            platform-tag: linux-x86_64
          - os: ubuntu-24.04-arm
            platform-tag: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout dexkit-mcp
        uses: actions/checkout@v4
        with:
          path: dexkit-mcp

      - name: Checkout DexKit upstream
        uses: actions/checkout@v4
        with:
          repository: LuckyPray/DexKit
          path: DexKit
          submodules: false
          ref: ${{ github.event.inputs.upstream_ref || '' }}

      - name: Copy mcp-server into DexKit
        shell: bash
        run: |
          # 复合构建 require mcp-server 位于 DexKit 根目录下，使 includeBuild("..") 生效
          cp -r dexkit-mcp/mcp-server DexKit/mcp-server

      - name: Prepare DexKit source
        shell: bash
        run: bash dexkit-mcp/scripts/prepare-build.sh DexKit

      - name: Setup JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      # ─── Windows: LLVM-MinGW + 静态 zlib ───────────────────────────────────
      - name: Install LLVM-MinGW (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          LLVM_URL="https://github.com/mstorsjo/llvm-mingw/releases/download/20240619/llvm-mingw-20240619-ucrt-x86_64.zip"
          curl -L --retry 3 -o llvm-mingw.zip "$LLVM_URL"
          7z x llvm-mingw.zip -o/c/llvm-mingw
          mv /c/llvm-mingw/llvm-mingw-* /c/llvm-mingw/llvm-mingw
          echo "/c/llvm-mingw/llvm-mingw/bin" >> $GITHUB_PATH
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      - name: Build static zlib (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ZLIB_URL="https://zlib.net/zlib-1.3.1.tar.gz"
          curl -L --retry 3 -o zlib.tar.gz "$ZLIB_URL"
          tar xzf zlib.tar.gz
          cd zlib-1.3.1
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_INSTALL_PREFIX=/c/llvm-mingw/llvm-mingw/x86_64-w64-mingw32 \
            ..
          ninja install
          # 删除动态导入库 libz.dll.a，强制链接器使用静态 libz.a
          rm -f /c/llvm-mingw/llvm-mingw/x86_64-w64-mingw32/lib/libz.dll.a

      # ─── Linux: cmake + ninja + zlib-dev ───────────────────────────────────
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zlib1g-dev

      # ─── 构建 fat-jar ────────────────────────────────────────────────────
      - name: Build mcp-server fat-jar
        working-directory: DexKit/mcp-server
        shell: bash
        env:
          NATIVE_PLATFORM_TAG: ${{ matrix.platform-tag }}
        run: |
          chmod +x ./gradlew
          ./gradlew shadowJar --no-daemon --stacktrace

      - name: Verify native lib in jar
        shell: bash
        working-directory: DexKit/mcp-server/build/libs
        run: |
          JAR_FILE=$(ls dexkit-mcp-server-*.jar | head -1)
          echo "Inspecting $JAR_FILE"
          # 列出 jar 内 native 资源
          unzip -l "$JAR_FILE" | grep -E "native/.*\.(dll|so|dylib)" || true

      - name: Rename jar with platform tag
        shell: bash
        working-directory: DexKit/mcp-server/build/libs
        run: |
          mv dexkit-mcp-server-0.1.0.jar \
             dexkit-mcp-server-0.1.0-${{ matrix.platform-tag }}.jar
          ls -lh

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: dexkit-mcp-server-${{ matrix.platform-tag }}
          path: DexKit/mcp-server/build/libs/dexkit-mcp-server-*.jar
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all platform jars
        uses: actions/download-artifact@v4
        with:
          path: jars
          pattern: dexkit-mcp-server-*
          merge-multiple: false

      - name: Flatten jar files
        run: |
          mkdir -p release
          find jars -name "*.jar" -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
